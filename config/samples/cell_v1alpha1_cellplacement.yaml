apiVersion: cell.cellrouter.io/v1alpha1
kind: CellPlacement
metadata:
  name: tenant-a-placement
spec:
  routerRef: default-router
  listenerNames:
    - http
  hostnames:
    - payments.example.com
  pathMatch:
    type: PathPrefix
    value: /tenant
  headerMatches:
    - name: X-Tenant
      value: tenant-a
  destinations:
    - cellRef: payments-cell-1
      weight: 1
---
apiVersion: cell.cellrouter.io/v1alpha1
kind: CellPlacement
metadata:
  name: tenant-b-placement
spec:
  routerRef: default-router
  listenerNames:
    - http
  hostnames:
    - payments.example.com
  pathMatch:
    type: PathPrefix
    value: /tenant
  headerMatches:
    - name: X-Tenant
      value: tenant-b
  destinations:
    - cellRef: payments-cell-2
      weight: 1
