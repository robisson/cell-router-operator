apiVersion: cell.cellrouter.io/v1alpha1
kind: CellPlacement
metadata:
  name: header-exact-placement
spec:
  routerRef: default-router
  listenerNames:
    - http
  hostnames:
    - header-exact.payments.example.com
  selectors:
    - source:
        type: Header
        name: X-Account
      operator: Exact
      value: tenant-a
  destinations:
    - cellRef: payments-cell-1
---
apiVersion: cell.cellrouter.io/v1alpha1
kind: CellPlacement
metadata:
  name: header-prefix-placement
spec:
  routerRef: default-router
  listenerNames:
    - http
  hostnames:
    - header-prefix.payments.example.com
  selectors:
    - source:
        type: Header
        name: X-Account
      operator: Prefix
      value: team-
  destinations:
    - cellRef: payments-cell-1
---
apiVersion: cell.cellrouter.io/v1alpha1
kind: CellPlacement
metadata:
  name: header-suffix-placement
spec:
  routerRef: default-router
  listenerNames:
    - http
  hostnames:
    - header-suffix.payments.example.com
  selectors:
    - source:
        type: Header
        name: X-Account
      operator: Suffix
      value: -west
  destinations:
    - cellRef: payments-cell-2
---
apiVersion: cell.cellrouter.io/v1alpha1
kind: CellPlacement
metadata:
  name: header-range-placement
spec:
  routerRef: default-router
  listenerNames:
    - http
  hostnames:
    - header-range.payments.example.com
  selectors:
    - source:
        type: Header
        name: X-Shard
      operator: Range
      range:
        start: "100"
        end: "199"
  destinations:
    - cellRef: payments-cell-1
---
