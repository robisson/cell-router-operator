---
apiVersion: cell.cellrouter.io/v1alpha1
kind: CellPlacement
metadata:
  name: path-exact-placement
spec:
  routerRef: default-router
  listenerNames:
    - http
  hostnames:
    - path-exact.payments.example.com
  selectors:
    - source:
        type: PathCapture
        name: accountId
        pathRegex: '^/accounts/(?P<accountId>[a-z0-9-]+)$'
      operator: Exact
      value: tenant-a
  destinations:
    - cellRef: payments-cell-1
---
