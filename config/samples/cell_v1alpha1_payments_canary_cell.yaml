apiVersion: cell.cellrouter.io/v1alpha1
kind: Cell
metadata:
  name: payments-canary
spec:
  state: Active
  namespaceLabels:
    team: payments
    release: canary
  workloadSelector:
    app: payments-canary-gateway
  entrypoint:
    serviceName: payments-canary-entry
    port: 8080
  tearDownOnDelete: true
