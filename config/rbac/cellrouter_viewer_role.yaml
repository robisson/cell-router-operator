# This rule is not used by the project cell-router-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to cell.cellrouter.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cell-router-operator
    app.kubernetes.io/managed-by: kustomize
  name: cellrouter-viewer-role
rules:
- apiGroups:
  - cell.cellrouter.io
  resources:
  - cellrouters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cell.cellrouter.io
  resources:
  - cellrouters/status
  verbs:
  - get
