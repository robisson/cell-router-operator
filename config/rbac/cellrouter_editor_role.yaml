# This rule is not used by the project cell-router-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the cell.cellrouter.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cell-router-operator
    app.kubernetes.io/managed-by: kustomize
  name: cellrouter-editor-role
rules:
- apiGroups:
  - cell.cellrouter.io
  resources:
  - cellrouters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cell.cellrouter.io
  resources:
  - cellrouters/status
  verbs:
  - get
