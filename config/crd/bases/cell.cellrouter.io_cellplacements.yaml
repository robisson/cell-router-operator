---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: cellplacements.cell.cellrouter.io
spec:
  group: cell.cellrouter.io
  names:
    kind: CellPlacement
    listKind: CellPlacementList
    plural: cellplacements
    shortNames:
    - cellplc
    singular: cellplacement
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CellPlacement declares a router-scoped traffic partition that
          resolves to one or more cells.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired placement behavior.
            properties:
              destinations:
                description: Destinations defines the cells and weights selected by
                  this placement.
                items:
                  description: CellRouteBackendRef points to a Cell and optional weight
                    within a generated HTTPRoute rule.
                  properties:
                    cellRef:
                      description: CellRef points to the target Cell.
                      minLength: 1
                      type: string
                    weight:
                      description: Weight controls the relative traffic weight towards
                        the referenced Cell.
                      format: int32
                      type: integer
                  required:
                  - cellRef
                  type: object
                minItems: 1
                type: array
              headerMatches:
                description: HeaderMatches constrains traffic using HTTP header matching.
                items:
                  description: HTTPHeaderMatch represents a single HTTP header match
                    rule.
                  properties:
                    name:
                      description: Name is the HTTP header name to match.
                      maxLength: 256
                      minLength: 1
                      pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                      type: string
                    type:
                      description: Type selects the header match strategy. Defaults
                        to HeaderMatchExact.
                      enum:
                      - Exact
                      - RegularExpression
                      type: string
                    value:
                      description: Value is the HTTP header value to match.
                      minLength: 1
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              hostnames:
                description: Hostnames declares the hostnames handled by the placement
                  route.
                items:
                  description: |-
                    Hostname is the fully qualified domain name of a network host. This matches
                    the RFC 1123 definition of a hostname with 2 notable exceptions:

                     1. IPs are not allowed.
                     2. A hostname may be prefixed with a wildcard label (`*.`). The wildcard
                        label must appear by itself as the first label.

                    Hostname can be "precise" which is a domain name without the terminating
                    dot of a network host (e.g. "foo.example.com") or "wildcard", which is a
                    domain name prefixed with a single wildcard label (e.g. `*.example.com`).

                    Note that as per RFC1035 and RFC1123, a *label* must consist of lower case
                    alphanumeric characters or '-', and must start and end with an alphanumeric
                    character. No other punctuation is allowed.
                  maxLength: 253
                  minLength: 1
                  pattern: ^(\*\.)?[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                  type: string
                type: array
              listenerNames:
                description: ListenerNames restrict the generated route to specific
                  listeners.
                items:
                  type: string
                type: array
              pathMatch:
                description: PathMatch constrains traffic to a specific path expression.
                properties:
                  type:
                    description: Type is the path matching strategy. Defaults to PathMatchPathPrefix.
                    enum:
                    - Exact
                    - PathPrefix
                    - RegularExpression
                    type: string
                  value:
                    description: Value is the path value.
                    minLength: 1
                    type: string
                required:
                - value
                type: object
              queryParamMatches:
                description: QueryParamMatches constrains traffic using HTTP query
                  parameter matching.
                items:
                  description: HTTPQueryParamMatch represents a single query parameter
                    match rule.
                  properties:
                    name:
                      description: Name is the query parameter name.
                      maxLength: 256
                      minLength: 1
                      pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                      type: string
                    type:
                      description: Type selects the match strategy. Defaults to QueryParamMatchExact.
                      enum:
                      - Exact
                      - RegularExpression
                      type: string
                    value:
                      description: Value is the expected parameter value.
                      minLength: 1
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              routerRef:
                description: RouterRef points to the CellRouter responsible for materializing
                  this placement.
                minLength: 1
                type: string
            required:
            - destinations
            - routerRef
            type: object
          status:
            description: Status defines the observed state of the placement.
            properties:
              conditions:
                description: Conditions represent the current state of the placement.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration tracks the last reconciled generation.
                format: int64
                type: integer
              resolvedBackends:
                description: ResolvedBackends lists the currently selected traffic-ready
                  cells.
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
